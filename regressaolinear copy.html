<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio de Vendas 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --sidebar-bg: #151921;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #00f2fe;
            --accent-glow: rgba(0, 242, 254, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --success-color: #4ade80;
            --choice-color: #facc15;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.4;
            overflow: hidden;
            font-size: 1.1rem;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background-image: radial-gradient(circle at top right, rgba(0, 242, 254, 0.05), transparent);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(21, 25, 33, 0.8);
            padding: 1.5rem 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .logo h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .choice-display {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.2rem;
        }

        .label-sm {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .value-display {
            color: var(--choice-color);
            font-family: monospace;
            font-weight: 800;
            font-size: 2.2rem;
            white-space: nowrap;
            text-shadow: 0 0 15px rgba(250, 204, 21, 0.3);
        }

        .chart-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            padding: 2rem;
            flex: 1;
            min-height: 0;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        canvas {
            cursor: ns-resize;
            /* Indicating vertical drag */
        }

        .instructions {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 0.75rem 1.5rem;
            border-radius: 30px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="main-content">
        <header class="top-bar">
            <div class="logo">
                <h1>Desafio: Vendas 2026</h1>
            </div>

            <div class="choice-display">
                <span class="label-sm">Sua Escolha para 2026</span>
                <span id="user-val" class="value-display">---</span>
            </div>
        </header>

        <div class="chart-container">
            <canvas id="challengeChart"></canvas>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('challengeChart');
            const ctx = canvas.getContext('2d');
            const userValDisplay = document.getElementById('user-val');

            let chart;
            let isDragging = false;
            let userChoiceY = 1600; // Valor inicial neutro

            const historicalData = [
                { x: 2010, y: 723 },
                { x: 2011, y: 814 },
                { x: 2012, y: 905 },
                { x: 2014, y: 1087 },
                { x: 2017, y: 1360 },
                { x: 2018, y: 1451 },
                { x: 2019, y: 1542 }
            ];

            function initChart() {
                const config = {
                    type: 'scatter',
                    data: {
                        datasets: [
                            {
                                label: 'Vendas Históricas',
                                data: historicalData,
                                backgroundColor: '#00f2fe',
                                borderColor: 'rgba(0, 242, 254, 0.4)',
                                borderWidth: 2,
                                pointRadius: 10,
                                pointHoverRadius: 12,
                                showLine: true,
                                tension: 0.1
                            },
                            {
                                label: 'Conexão Aposta',
                                data: [historicalData[historicalData.length - 1], { x: 2026, y: userChoiceY }],
                                borderColor: '#facc15',
                                borderWidth: 3,
                                borderDash: [5, 5],
                                pointRadius: 0,
                                showLine: true,
                                fill: false,
                                z: 0
                            },
                            {
                                label: 'Sua Aposta (2026)',
                                data: [{ x: 2026, y: userChoiceY }],
                                backgroundColor: '#facc15',
                                borderColor: '#ffffff',
                                borderWidth: 2,
                                pointRadius: 15,
                                pointHoverRadius: 18,
                                pointStyle: 'star',
                                z: 3
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#94a3b8',
                                    font: { family: 'Inter', size: 16, weight: 'bold' },
                                    filter: (item) => !['Sua Aposta (2026)', 'Conexão Aposta'].includes(item.text)
                                }
                            },
                            tooltip: { enabled: false }
                        },
                        scales: {
                            x: {
                                min: 2009,
                                max: 2027,
                                grid: { color: 'rgba(255, 255, 255, 0.05)' },
                                ticks: { color: '#94a3b8', stepSize: 1, font: { size: 14 } },
                                title: { display: true, text: 'Ano', color: '#94a3b8', font: { size: 16 } }
                            },
                            y: {
                                min: 0,
                                max: 2500,
                                grid: { color: 'rgba(255, 255, 255, 0.05)' },
                                ticks: { color: '#94a3b8', font: { size: 14 } },
                                title: { display: true, text: 'Vendas', color: '#94a3b8', font: { size: 16 } }
                            }
                        }
                    }
                };

                chart = new Chart(ctx, config);
                updateDisplay();
            }

            function updateDisplay() {
                const valor = userChoiceY.toFixed(0);
                userValDisplay.textContent = valor;
                if (typeof setAnswer === 'function') setAnswer(valor);
            }

            function handleInteraction(e) {
                const rect = canvas.getBoundingClientRect();
                const mouseY = e.clientY - rect.top;

                // Converter pixels do mouse para valor Y do gráfico
                const yValue = chart.scales.y.getValueForPixel(mouseY);

                if (yValue >= 0 && yValue <= 2500) {
                    userChoiceY = Math.round(yValue);
                    chart.data.datasets[1].data[1].y = userChoiceY; // Update connection line end
                    chart.data.datasets[2].data[0].y = userChoiceY; // Update star point
                    chart.update('none');
                    updateDisplay();
                }
            }

            canvas.addEventListener('mousedown', (e) => {
                const points = chart.getElementsAtEventForMode(e, 'nearest', { intersect: true }, false);
                if (points.length > 0 && points[0].datasetIndex === 2) {
                    isDragging = true;
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    handleInteraction(e);
                }
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
            });

            // Fallback: Click direto no eixo de 2026
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const xValue = chart.scales.x.getValueForPixel(mouseX);

                // Se clicar perto de 2026, move o ponto direto
                if (Math.abs(xValue - 2026) < 0.5) {
                    handleInteraction(e);
                }
            });

            initChart();
        });
    </script>
</body>

</html>
